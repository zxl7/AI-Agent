version: '3.9'

services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: alpha_agent_chromadb
    ports:
      - "8000:8000"
    volumes:
      # 最新版的 Chroma 默认将数据存在容器的 /data 目录下
      - ./chroma_docker_data:/data
    environment:
      - IS_PERSISTENT=TRUE
    restart: unless-stopped
